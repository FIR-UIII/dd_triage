<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DD Triage — Загрузка ID</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body { background: #0d1117; color: #c9d1d9; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .card-header { background: #21262d; border-bottom: 1px solid #30363d; }
    .form-control, .form-control:focus {
      background: #0d1117; color: #c9d1d9;
      border-color: #30363d;
    }
    .form-control::placeholder { color: #6e7681; }
    .btn-primary { background: #238636; border-color: #2ea043; }
    .btn-primary:hover { background: #2ea043; border-color: #3fb950; }
    .badge-count { font-size: .75rem; }
  </style>
</head>
<body>
<div class="container py-5" style="max-width:640px">
  <div class="card shadow">
    <div class="card-header py-3">
      <h5 class="mb-0">DefectDojo Triage — Ввод ID сработок</h5>
    </div>
    <div class="card-body">
      {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      <form method="POST" action="/">
        <div class="mb-3">
          <label for="finding_ids" class="form-label text-secondary">
            Вставьте ID сработок (каждый на новой строке):
          </label>
          <textarea
            id="finding_ids"
            name="finding_ids"
            class="form-control font-monospace"
            rows="12"
            placeholder="111111&#10;222222&#10;333333"
            autofocus
          ></textarea>
          <div class="form-text text-secondary mt-1">
            Только числовые ID; пустые строки и пробелы игнорируются.
          </div>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-primary">
            Загрузить сработки &rarr;
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
// Live counter
const ta = document.getElementById('finding_ids');
const btn = ta.closest('form').querySelector('button');
ta.addEventListener('input', () => {
  const ids = ta.value.split('\n').filter(l => l.trim().match(/^\d+$/));
  btn.textContent = ids.length
    ? `Загрузить ${ids.length} сработок →`
    : 'Загрузить сработки →';
});
</script>
</body>
</html>
